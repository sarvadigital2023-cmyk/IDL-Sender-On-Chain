name: Send IDL On-Chain (Anchor OLD Format)

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Unique job identifier'
        required: true
      program_id:
        description: 'On-chain Program ID'
        required: true
      cluster:
        description: 'devnet or mainnet'
        required: true
        default: 'devnet'
      keeper_keypair:
        description: 'Keeper keypair JSON (passed from Replit)'
        required: true

permissions:
  contents: write

jobs:
  send-idl:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up keeper keypair
        run: echo '${{ inputs.keeper_keypair }}' > /tmp/keeper.json

      - name: Download IDL from repo
        run: |
          gh api repos/${{ github.repository }}/contents/inputs/${{ inputs.job_id }}/idl.json \
            --jq '.content' | tr -d '\n' | base64 -d > /tmp/idl.json
          echo "IDL downloaded: $(wc -c < /tmp/idl.json) bytes"
          echo "First 80 chars: $(head -c 80 /tmp/idl.json)"

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set RPC URL
        id: rpc
        run: |
          if [ "${{ inputs.cluster }}" = "mainnet" ]; then
            echo "url=https://api.mainnet-beta.solana.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://api.devnet.solana.com" >> $GITHUB_OUTPUT
          fi

      - name: Verify program exists on-chain
        run: |
          RPC='${{ steps.rpc.outputs.url }}'
          PROG='${{ inputs.program_id }}'
          echo "Checking program $PROG on $RPC..."
          PROG_JSON=$(curl -sf -X POST "$RPC" -H 'Content-Type: application/json' \
            -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getAccountInfo\",\"params\":[\"$PROG\",{\"encoding\":\"base64\"}]}" 2>/dev/null || echo '{}')
          OWNER=$(echo "$PROG_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); v=(d.get('result') or {}).get('value'); print(v['owner'] if v else 'NOT_FOUND')" 2>/dev/null || echo 'PARSE_ERR')
          echo "Program owner: $OWNER"
          if [ "$OWNER" = 'NOT_FOUND' ] || [ "$OWNER" = 'PARSE_ERR' ]; then
            echo 'ERROR: Program not found on chain. Deploy it first.'
            exit 1
          fi
          echo 'Program confirmed on-chain ✓'

      - name: Install @solana-program/program-metadata CLI
        run: npm install -g @solana-program/program-metadata@0.5.1 2>&1 | tail -3

      - name: Write IDL on-chain via program-metadata
        id: write_idl
        run: |
          echo "Program: ${{ inputs.program_id }}"
          echo "Cluster: ${{ steps.rpc.outputs.url }}"
          echo "IDL size: $(wc -c < /tmp/idl.json) bytes"
          WRITE_OUT=$(program-metadata \
            --keypair /tmp/keeper.json \
            --rpc '${{ steps.rpc.outputs.url }}' \
            --priority-fees 200000 \
            write idl '${{ inputs.program_id }}' /tmp/idl.json 2>&1) && {
            echo "IDL written successfully!"
            echo "$WRITE_OUT"
          } || {
            echo "WRITE FAILED: $WRITE_OUT"
            echo "anchor_error<<EOF" >> $GITHUB_OUTPUT
            echo "${WRITE_OUT:0:300}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          }

      - name: Verify IDL on-chain
        id: verify_idl
        if: steps.write_idl.outcome == 'success'
        run: |
          echo "Waiting 8s for on-chain propagation..."
          sleep 8
          FETCH=$(program-metadata \
            --rpc '${{ steps.rpc.outputs.url }}' \
            fetch idl '${{ inputs.program_id }}' 2>&1 || true)
          echo "Fetch result (first 300 chars): ${FETCH:0:300}"
          if echo "$FETCH" | grep -qE '"instructions"|"accounts"|"types"'; then
            echo "verified=true" >> $GITHUB_OUTPUT
            echo "VERIFIED: IDL confirmed on-chain"
          else
            echo "verified=false" >> $GITHUB_OUTPUT
            echo "NOT VERIFIED: fetch did not return expected IDL structure"
            exit 1
          fi

      - name: Write output to repo
        if: always()
        run: |
          WRITE_OK="${{ steps.write_idl.outcome }}"
          VERIFY_OK="${{ steps.verify_idl.outcome }}"
          if [ "$WRITE_OK" = "success" ] && [ "$VERIFY_OK" = "success" ]; then
            JSON="{\"success\":true,\"programId\":\"${{ inputs.program_id }}\",\"cluster\":\"${{ inputs.cluster }}\"}"
          elif [ "$WRITE_OK" != "success" ]; then
            RAW_ERR=$(echo '${{ steps.write_idl.outputs.anchor_error }}' | head -c 300 | tr -d '\n\"' | sed "s/'/\\''/g" || true)
            ERR_MSG="IDL write failed: ${RAW_ERR:-check GitHub Actions log}"
            JSON="{\"success\":false,\"error\":\"${ERR_MSG}\",\"programId\":\"${{ inputs.program_id }}\",\"cluster\":\"${{ inputs.cluster }}\"}"
          else
            JSON="{\"success\":false,\"error\":\"IDL write succeeded but fetch verification failed — IDL may NOT be on-chain yet\",\"programId\":\"${{ inputs.program_id }}\",\"cluster\":\"${{ inputs.cluster }}\"}"
          fi
          CONTENT=$(printf '%s' "$JSON" | base64 -w 0)
          gh api repos/${{ github.repository }}/contents/outputs/${{ inputs.job_id }}.json \
            --method PUT \
            --raw-field "message=IDL sender output for job ${{ inputs.job_id }}" \
            --raw-field "content=$CONTENT"

      - name: Cleanup input IDL from repo
        if: always()
        run: |
          SHA=$(gh api repos/${{ github.repository }}/contents/inputs/${{ inputs.job_id }}/idl.json \
            --jq '.sha' 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            gh api repos/${{ github.repository }}/contents/inputs/${{ inputs.job_id }}/idl.json \
              --method DELETE \
              --raw-field "message=Cleanup IDL for job ${{ inputs.job_id }}" \
              --raw-field "sha=$SHA" || true
          fi