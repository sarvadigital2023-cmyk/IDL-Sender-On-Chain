name: Send IDL On-Chain

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Unique job identifier'
        required: true
      program_id:
        description: 'On-chain Program ID'
        required: true
      cluster:
        description: 'devnet or mainnet'
        required: true
        default: 'devnet'
      idl_b64:
        description: 'IDL JSON content (base64 encoded)'
        required: true
      keeper_keypair:
        description: 'Keeper keypair JSON (passed from Replit)'
        required: true

permissions:
  contents: write

jobs:
  send-idl:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up keeper keypair
        run: echo '${{ inputs.keeper_keypair }}' > /tmp/keeper.json

      - name: Decode IDL from base64
        run: echo '${{ inputs.idl_b64 }}' | base64 -d > /tmp/idl.json

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set RPC URL
        id: rpc
        run: |
          if [ "${{ inputs.cluster }}" = "mainnet" ]; then
            echo "url=https://api.mainnet-beta.solana.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://api.devnet.solana.com" >> $GITHUB_OUTPUT
          fi

      - name: Write IDL on-chain
        id: write_idl
        run: |
          set +e
          WRITE_OUT=$(npx --yes @solana-program/program-metadata@latest write idl \
            ${{ inputs.program_id }} /tmp/idl.json \
            --keypair /tmp/keeper.json \
            --rpc ${{ steps.rpc.outputs.url }} \
            --priority-fees 200000 2>&1)
          WRITE_EXIT=$?
          set -e
          echo "$WRITE_OUT"
          echo "write_output=$WRITE_OUT" >> $GITHUB_OUTPUT
          exit $WRITE_EXIT

      - name: Verify IDL on-chain (fetch)
        id: verify_idl
        if: steps.write_idl.outcome == 'success'
        run: |
          set +e
          FETCH_OUT=$(npx --yes @solana-program/program-metadata@latest fetch idl \
            ${{ inputs.program_id }} \
            --keypair /tmp/keeper.json \
            --rpc ${{ steps.rpc.outputs.url }} 2>&1)
          FETCH_EXIT=$?
          set -e
          echo "$FETCH_OUT" | head -c 500
          if echo "$FETCH_OUT" | grep -q '{'; then
            echo "verified=true" >> $GITHUB_OUTPUT
          else
            echo "verified=false" >> $GITHUB_OUTPUT
          fi

      - name: Write output to repo
        if: always()
        run: |
          OUTCOME="${{ steps.write_idl.outcome }}"
          VERIFIED="${{ steps.verify_idl.outputs.verified }}"
          if [ "$OUTCOME" = "success" ] && [ "$VERIFIED" = "true" ]; then
            JSON="{\"success\":true,\"programId\":\"${{ inputs.program_id }}\",\"cluster\":\"${{ inputs.cluster }}\",\"verified\":true}"
          elif [ "$OUTCOME" = "success" ]; then
            JSON="{\"success\":false,\"error\":\"IDL written but fetch-verification failed\",\"programId\":\"${{ inputs.program_id }}\",\"cluster\":\"${{ inputs.cluster }}\"}"
          else
            JSON="{\"success\":false,\"error\":\"write idl command failed — check Actions log\",\"programId\":\"${{ inputs.program_id }}\",\"cluster\":\"${{ inputs.cluster }}\"}"
          fi
          CONTENT=$(printf '%s' "$JSON" | base64 -w 0)
          gh api repos/${{ github.repository }}/contents/outputs/${{ inputs.job_id }}.json \
            --method PUT \
            --raw-field "message=IDL sender output for job ${{ inputs.job_id }}" \
            --raw-field "content=$CONTENT"
