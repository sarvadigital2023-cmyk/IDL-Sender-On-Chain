name: Send IDL On-Chain (Anchor OLD Format)

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Unique job identifier'
        required: true
      program_id:
        description: 'On-chain Program ID'
        required: true
      cluster:
        description: 'devnet or mainnet'
        required: true
        default: 'devnet'
      keeper_keypair:
        description: 'Keeper keypair JSON (passed from Replit)'
        required: true

permissions:
  contents: write

jobs:
  send-idl:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up keeper keypair
        run: echo '${{ inputs.keeper_keypair }}' > /tmp/keeper.json

      - name: Download IDL from repo
        run: |
          gh api repos/${{ github.repository }}/contents/inputs/${{ inputs.job_id }}/idl.json \
            --jq '.content' | tr -d '\n' | base64 -d > /tmp/idl.json
          echo "IDL downloaded: $(wc -c < /tmp/idl.json) bytes"
          echo "First 80 chars: $(head -c 80 /tmp/idl.json)"

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anchor CLI 0.30.1 (writes OLD format anchor:idl)
        run: |
          npm install -g @coral-xyz/anchor-cli@0.30.1
          anchor --version

      - name: Set RPC URL
        id: rpc
        run: |
          if [ "${{ inputs.cluster }}" = "mainnet" ]; then
            echo "url=https://api.mainnet-beta.solana.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://api.devnet.solana.com" >> $GITHUB_OUTPUT
          fi

      - name: Write IDL on-chain (OLD format anchor:idl createWithSeed)
        id: write_idl
        run: |
          echo "Writing IDL to OLD format anchor:idl account..."
          echo "Program: ${{ inputs.program_id }}"
          echo "Cluster: ${{ steps.rpc.outputs.url }}"
          # Try init first (new account). On failure, try upgrade (existing account).
          if anchor idl init \
              --filepath /tmp/idl.json \
              --provider.cluster "${{ steps.rpc.outputs.url }}" \
              --provider.wallet /tmp/keeper.json \
              ${{ inputs.program_id }} 2>&1; then
            echo "IDL account initialized successfully (new account)"
          else
            echo "Init failed — trying upgrade (account may already exist)..."
            anchor idl upgrade \
              --filepath /tmp/idl.json \
              --provider.cluster "${{ steps.rpc.outputs.url }}" \
              --provider.wallet /tmp/keeper.json \
              ${{ inputs.program_id }}
            echo "IDL upgraded successfully (existing account)"
          fi

      - name: Verify IDL on-chain (anchor idl fetch — OLD format)
        id: verify_idl
        if: steps.write_idl.outcome == 'success'
        run: |
          echo "Waiting 8s for on-chain propagation..."
          sleep 8
          FETCH=$(anchor idl fetch \
            --provider.cluster "${{ steps.rpc.outputs.url }}" \
            ${{ inputs.program_id }} 2>&1 || true)
          echo "Fetch result (first 300 chars): ${FETCH:0:300}"
          if echo "$FETCH" | grep -q '"instructions"'; then
            echo "verified=true" >> $GITHUB_OUTPUT
            echo "VERIFIED: OLD format anchor:idl confirmed on-chain"
          else
            echo "verified=false" >> $GITHUB_OUTPUT
            echo "NOT VERIFIED: anchor idl fetch did not return IDL with instructions"
            exit 1
          fi

      - name: Write output to repo
        if: always()
        run: |
          WRITE_OK="${{ steps.write_idl.outcome }}"
          VERIFY_OK="${{ steps.verify_idl.outcome }}"
          if [ "$WRITE_OK" = "success" ] && [ "$VERIFY_OK" = "success" ]; then
            JSON="{\"success\":true,\"programId\":\"${{ inputs.program_id }}\",\"cluster\":\"${{ inputs.cluster }}\"}"
          elif [ "$WRITE_OK" != "success" ]; then
            JSON="{\"success\":false,\"error\":\"anchor idl init\/upgrade failed — check GitHub Actions log\",\"programId\":\"${{ inputs.program_id }}\",\"cluster\":\"${{ inputs.cluster }}\"}"
          else
            JSON="{\"success\":false,\"error\":\"write succeeded but anchor idl fetch failed — IDL NOT on-chain\",\"programId\":\"${{ inputs.program_id }}\",\"cluster\":\"${{ inputs.cluster }}\"}"
          fi
          CONTENT=$(printf '%s' "$JSON" | base64 -w 0)
          gh api repos/${{ github.repository }}/contents/outputs/${{ inputs.job_id }}.json \
            --method PUT \
            --raw-field "message=IDL sender output for job ${{ inputs.job_id }}" \
            --raw-field "content=$CONTENT"

      - name: Cleanup input IDL from repo
        if: always()
        run: |
          SHA=$(gh api repos/${{ github.repository }}/contents/inputs/${{ inputs.job_id }}/idl.json \
            --jq '.sha' 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            gh api repos/${{ github.repository }}/contents/inputs/${{ inputs.job_id }}/idl.json \
              --method DELETE \
              --raw-field "message=Cleanup IDL for job ${{ inputs.job_id }}" \
              --raw-field "sha=$SHA" || true
          fi